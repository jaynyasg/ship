services:
  - type: web
    name: ship
    runtime: node
    plan: starter
    buildCommand: corepack enable && corepack prepare pnpm@10.27.0 --activate && pnpm install --frozen-lockfile --prod=false && pnpm build
    startCommand: node api/dist/db/migrate.js && node api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: DATABASE_URL
        fromDatabase:
          name: ship-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

  - type: cron
    name: ship-security-probe
    runtime: node
    plan: starter
    schedule: '0 8 1 * *'
    buildCommand: corepack enable && corepack prepare pnpm@10.27.0 --activate && pnpm install --frozen-lockfile --prod=false && pnpm build:api
    startCommand: node scripts/render-security-probe.mjs
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: SHIP_SECURITY_HOSTPORT
        fromService:
          name: ship
          type: web
          property: hostport
      - key: SHIP_SECURITY_REPORT_NAME
        value: security-audit-render

databases:
  - name: ship-db
    databaseName: ship
    user: ship
