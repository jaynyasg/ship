name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pnpm lint
            command: pnpm lint
          - name: pnpm type-check
            command: pnpm type-check
          - name: pnpm build:api
            command: pnpm build:api
          - name: pnpm build:web
            command: pnpm build:web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}
